<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StremioFR — Installation</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #e53e3e;
      --red-dark: #c53030;
      --red-glow: rgba(229, 62, 62, 0.15);
      --red-dim: rgba(229, 62, 62, 0.08);
      --bg: #0a0a0b;
      --bg2: #111113;
      --bg3: #18181b;
      --border: rgba(255,255,255,0.06);
      --text: #f0f0f0;
      --muted: #666;
      --muted2: #444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 600px;
      background: radial-gradient(ellipse, rgba(229,62,62,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 60px;
      background: rgba(10,10,11,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand { display: flex; align-items: center; gap: 10px; }

    .nav-logo-box {
      width: 28px; height: 28px;
      background: var(--red);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .nav-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 2px; color: #fff;
    }
    .nav-name span { color: var(--red); }

    .nav-links { display: flex; align-items: center; gap: 8px; }

    .nav-link {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 13px; font-family: 'DM Sans', sans-serif;
      text-decoration: none; cursor: pointer; transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text); border-color: var(--muted2); background: var(--bg3); }

    .hero {
      position: relative; z-index: 1;
      text-align: center; padding: 80px 40px 60px;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px;
      background: var(--red-dim);
      border: 1px solid rgba(229,62,62,0.2);
      border-radius: 100px; font-size: 12px; color: var(--red);
      letter-spacing: 0.5px; margin-bottom: 28px;
    }
    .hero-badge::before {
      content: ''; width: 6px; height: 6px;
      background: var(--red); border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 8vw, 96px);
      line-height: 0.9; letter-spacing: 4px; color: #fff; margin-bottom: 8px;
    }
    .hero-title span { color: var(--red); display: block; }

    .hero-sub {
      font-size: 15px; color: var(--muted);
      max-width: 460px; margin: 20px auto 0;
      line-height: 1.6; font-weight: 300;
    }

    .stats-bar {
      display: flex; justify-content: center;
      margin: 48px auto 0; max-width: 520px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }

    .stat-item {
      flex: 1; padding: 20px 0; text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }

    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px; letter-spacing: 1px; color: var(--red); display: block;
    }
    .stat-label {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin-top: 2px;
    }

    main {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto; padding: 0 24px 120px;
    }

    .section-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; margin-top: 48px;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }
    .section-label {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 2px; white-space: nowrap;
    }

    #content { display: flex; flex-direction: column; gap: 12px; }

    .group-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; transition: border-color 0.2s;
    }
    .group-card:hover { border-color: rgba(229,62,62,0.2); }

    .group-head {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }

    .group-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .group-icon img { width: 100%; height: 100%; object-fit: cover; }

    .group-info { flex: 1; }
    .group-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .group-count { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .btn-select-all {
      font-size: 12px; padding: 5px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .btn-select-all:hover { background: var(--bg3); color: var(--text); }

    .group-body { padding: 8px; }

    .instance {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 8px; cursor: pointer;
      transition: background 0.15s; border: 1px solid transparent;
    }
    .instance:hover { background: var(--bg3); }
    .instance.selected { background: var(--red-dim); border-color: rgba(229,62,62,0.2); }

    .checkbox {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid var(--muted2); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .instance.selected .checkbox { background: var(--red); border-color: var(--red); }
    .check-svg { opacity: 0; transition: opacity 0.15s; }
    .instance.selected .check-svg { opacity: 1; }

    .inst-name { flex: 1; font-size: 13px; color: var(--text); }

    .inst-status { font-size: 12px; font-weight: 500; }
    .inst-status.up { color: #48bb78; }
    .inst-status.down { color: var(--red); }

    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.up { background: #48bb78; box-shadow: 0 0 6px rgba(72,187,120,0.5); }
    .status-dot.down { background: var(--red); box-shadow: 0 0 6px rgba(229,62,62,0.5); }

    .install-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      padding: 16px 32px;
      background: rgba(10,10,11,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }

    .install-info { font-size: 14px; color: var(--muted); }
    .install-info strong {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; color: var(--red); letter-spacing: 1px;
    }

    .install-btns { display: flex; gap: 8px; }

    .btn {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: 9px;
      font-size: 13px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-red { background: var(--red); color: #fff; }
    .btn-red:hover { background: var(--red-dark); transform: translateY(-1px); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--bg3); transform: translateY(-1px); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 14px; }
    .btn-ghost:hover { color: var(--text); background: var(--bg3); }

    .loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 14px; }
    .loading-dots { display: inline-flex; gap: 4px; margin-left: 8px; }
    .loading-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--red); animation: bounce 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-4px); opacity: 1; }
    }

    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 10px 20px; border-radius: 10px;
      font-size: 13px; opacity: 0; transition: all 0.25s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 4px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand">
      <div class="nav-logo-box">
        <img src="https://raw.githubusercontent.com/ninisq864/stremio-status-addonFR/main/logo.png" style="width:22px;height:22px;border-radius:4px;object-fit:cover" onerror="this.parentElement.innerHTML='📡'">
      </div>
      <div class="nav-name">STREMIO<span>FR</span></div>
    </div>
    <div class="nav-links">
      <a href="https://discord.gg/stremiofr" class="nav-link" target="_blank">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.08.114 18.1.135 18.115a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Discord
      </a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-badge">Statut en temps réel</div>
    <h1 class="hero-title">STATUT<span>DES ADDONS</span></h1>
    <p class="hero-sub">Sélectionne tes instances préférées et installe l'addon directement dans Stremio.</p>
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-num" id="stat-total">—</span>
        <span class="stat-label">Instances</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" id="stat-online" style="color:#48bb78">—</span>
        <span class="stat-label">En ligne</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" id="stat-offline">—</span>
        <span class="stat-label">Hors ligne</span>
      </div>
    </div>
  </div>

  <main>
    <div class="section-header">
      <div class="section-line"></div>
      <div class="section-label">Choisir les instances</div>
      <div class="section-line"></div>
    </div>
    <div id="content">
      <div class="loading">
        Chargement des instances
        <span class="loading-dots"><span></span><span></span><span></span></span>
      </div>
    </div>
  </main>

  <div class="install-bar">
    <div class="install-info">
      <strong id="count">0</strong> instance(s) sélectionnée(s)
    </div>
    <div class="install-btns">
      <button class="btn btn-red" onclick="install('app')">📺 Installer</button>
      <button class="btn btn-outline" onclick="install('web')">🌐 Web</button>
      <button class="btn btn-ghost" onclick="copyLink()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copier
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const ADDON_URL = window.location.origin;

    const SECTION_ICONS = {
      'AIOStreams':    'https://raw.githubusercontent.com/Viren070/AIOStreams/main/packages/frontend/public/logo.png',
      'AIOMetadata':  'https://aiometadata.elfhosted.com/logo.png',
      'StremThru':    'https://i.imgur.com/vhQAnad.png',
      'Stream-Fusion':'https://i.imgur.com/jOzd3Oi.png',
      'COMET':        'https://i.imgur.com/jmVoVMu.jpeg',
    };

    let selected = new Set();
    let allMonitors = [];
    let groupPosters = {};
    let defaultPoster = 'https://i.imgur.com/8yPVxJJ.png';

    const FALLBACK_POSTERS = {
      'AIOStreams':    'https://raw.githubusercontent.com/Viren070/AIOStreams/main/packages/frontend/public/logo.png',
      'AIOMetadata':  'https://aiometadata.elfhosted.com/logo.png',
      'StremThru':    'https://emojiapi.dev/api/v1/sparkles/256.png',
      'Stream-Fusion':'https://stream-fusion.stremiofr.com/static/logo-stream-fusion.png',
      'COMET':        'https://i.imgur.com/jmVoVMu.jpeg',
      'Wastream':     'https://wastream.striho.top/static/wastream-logo.png',
    };

    async function load() {
      try {
        const [data, cfgData] = await Promise.all([
          fetch('/api/data').then(r => r.json()),
          fetch('/api/config/public').then(r => r.json()).catch(() => null)
        ]);
        groupPosters = (cfgData?.groupPosters && Object.keys(cfgData.groupPosters).length > 0)
          ? cfgData.groupPosters
          : FALLBACK_POSTERS;
        if (cfgData?.defaultPoster) defaultPoster = cfgData.defaultPoster;
        render(data.groups || [], data.heartbeats || {});
      } catch(e) {
        document.getElementById('content').innerHTML = '<div class="loading">❌ Impossible de charger les données</div>';
      }
    }

    function render(groups, heartbeats) {
      allMonitors = [];
      let totalUp = 0, totalDown = 0;
      let html = '';

      groups.forEach(group => {
        const name = group.name.replace(/\n/g,'').trim();
        const logoKey = Object.keys(groupPosters).find(k => name.toLowerCase().includes(k.toLowerCase()));
        const logo = groupPosters[logoKey] || defaultPoster;
        const upCount = group.monitorList.filter(m => {
          const last = (heartbeats[m.id]||[]).slice(-1)[0];
          return last && last.status === 1;
        }).length;
        totalUp += upCount;
        totalDown += group.monitorList.length - upCount;

        html += `
        <div class="group-card">
          <div class="group-head">
            <div class="group-icon">
              ${logo ? `<img src="${logo}" onerror="this.parentElement.innerHTML='📡'">` : '📡'}
            </div>
            <div class="group-info">
              <div class="group-name">${name}</div>
              <div class="group-count">${upCount}/${group.monitorList.length} en ligne</div>
            </div>
            <button class="btn-select-all" onclick="toggleGroup('${name}', this)">Tout sélectionner</button>
          </div>
          <div class="group-body">
            ${group.monitorList.map(monitor => {
              const hbs = heartbeats[monitor.id] || [];
              const last = hbs.slice(-1)[0];
              const isUp = last && last.status === 1;
              allMonitors.push({ id: monitor.id, name: monitor.name, group: name });
              return `
              <div class="instance" id="inst-${monitor.id}" onclick="toggle(${monitor.id})">
                <div class="checkbox">
                  <svg class="check-svg" width="9" height="7" viewBox="0 0 9 7" fill="none">
                    <path d="M1 3.5L3 5.5L8 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <span class="inst-name">${monitor.name}</span>
                <span class="inst-status ${isUp ? 'up' : 'down'}">${isUp ? 'En ligne' : 'Hors ligne'}</span>
                <div class="status-dot ${isUp ? 'up' : 'down'}"></div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      });

      document.getElementById('content').innerHTML = html;
      document.getElementById('stat-total').textContent = totalUp + totalDown;
      document.getElementById('stat-online').textContent = totalUp;
      document.getElementById('stat-offline').textContent = totalDown;
    }

    function toggle(id) {
      const el = document.getElementById(`inst-${id}`);
      selected.has(id) ? selected.delete(id) : selected.add(id);
      el.classList.toggle('selected', selected.has(id));
      document.getElementById('count').textContent = selected.size;
    }

    function toggleGroup(name, btn) {
      const group = allMonitors.filter(m => m.group === name);
      const allSel = group.every(m => selected.has(m.id));
      group.forEach(m => {
        const el = document.getElementById(`inst-${m.id}`);
        if (allSel) { selected.delete(m.id); el.classList.remove('selected'); }
        else { selected.add(m.id); el.classList.add('selected'); }
      });
      btn.textContent = allSel ? 'Tout sélectionner' : 'Tout désélectionner';
      document.getElementById('count').textContent = selected.size;
    }

    function getManifestUrl() {
      if (selected.size === 0) return `${ADDON_URL}/manifest.json`;
      const monitors = [...selected];
      const groups = [...new Set(allMonitors.filter(m => selected.has(m.id)).map(m => m.group))];
      const userCfg = { m: monitors, g: groups };
      // Base64 URL-safe : on remplace +→- /→_ et on enlève les =
      const encoded = btoa(JSON.stringify(userCfg))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
      return `${ADDON_URL}/${encoded}/manifest.json`;
    }

    function install(method) {
      const url = getManifestUrl();
      if (method === 'app') window.open(`stremio://${url.replace(/https?:\/\//,'')}`, '_blank');
      else window.open(`https://web.stremio.com/#/addons?addon=${encodeURIComponent(url)}`, '_blank');
    }

    function copyLink() {
      navigator.clipboard.writeText(getManifestUrl()).then(() => toast('✅ Lien copié !'));
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    load();
  </script>
</body>
</html>
