<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stremio FR Status</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111318;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* Navbar */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      background: #0d0f14;
      border-bottom: 1px solid hsla(0, 0%, 100%, 0.06);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-logo {
      font-size: 20px;
    }

    .nav-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .nav-version {
      font-size: 11px;
      color: #555;
      background: #1a1d24;
      border: 1px solid #2a2d35;
      border-radius: 4px;
      padding: 2px 8px;
    }

    .nav-discord {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #1a1d24;
      border: 1px solid #2a2d35;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .nav-discord:hover { color: #fff; border-color: #3a3d45; }

    /* Hero */
    .hero {
      text-align: center;
      padding: 52px 24px 40px;
    }

    .hero h1 {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .hero h1 span {
      color: #f97316;
    }

    .hero p {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 24px;
    }

    .hero-links {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hero-link {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #1a1d24;
      border: 1px solid #2a2d35;
      border-radius: 100px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      color: #9ca3af;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .hero-link:hover { color: #fff; border-color: #3a3d45; }

    /* Main */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* Section card */
    .section-card {
      background: #16191f;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      margin-bottom: 16px;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }

    .section-card:nth-child(1) { animation-delay: 0.05s; }
    .section-card:nth-child(2) { animation-delay: 0.1s; }
    .section-card:nth-child(3) { animation-delay: 0.15s; }
    .section-card:nth-child(4) { animation-delay: 0.2s; }
    .section-card:nth-child(5) { animation-delay: 0.25s; }

    .section-head {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .section-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .section-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .section-icon.orange { background: rgba(249,115,22,0.15); }
    .section-icon.blue   { background: rgba(59,130,246,0.15); }
    .section-icon.green  { background: rgba(34,197,94,0.15); }
    .section-icon.purple { background: rgba(168,85,247,0.15); }
    .section-icon.cyan   { background: rgba(6,182,212,0.15); }

    .section-head-info { flex: 1; }

    .section-head-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #9ca3af;
    }

    .section-head-sub {
      font-size: 12px;
      color: #4b5563;
      margin-top: 1px;
    }

    .section-select-all {
      font-size: 12px;
      color: #6b7280;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s;
    }
    .section-select-all:hover { color: #f97316; }

    .section-body {
      padding: 12px 16px;
    }

    /* Instance row */
    .instance {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .instance:hover { background: rgba(255,255,255,0.04); }
    .instance.selected { background: rgba(249,115,22,0.06); }

    .checkbox {
      width: 17px;
      height: 17px;
      border: 1.5px solid #374151;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .instance.selected .checkbox {
      background: #f97316;
      border-color: #f97316;
    }
    .check-svg { display: none; }
    .instance.selected .check-svg { display: block; }

    .instance-name {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: #d1d5db;
    }

    .uptime {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 100px;
    }
    .uptime.high { color: #22c55e; background: rgba(34,197,94,0.1); }
    .uptime.mid  { color: #f59e0b; background: rgba(245,158,11,0.1); }
    .uptime.low  { color: #ef4444; background: rgba(239,68,68,0.1); }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.up   { background: #22c55e; box-shadow: 0 0 5px rgba(34,197,94,0.6); }
    .status-dot.down { background: #ef4444; box-shadow: 0 0 5px rgba(239,68,68,0.6); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 0;
      color: #4b5563;
      font-size: 14px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid #1f2937;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }

    /* Install bar */
    .install-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0d0f14;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      z-index: 40;
    }

    .install-info {
      font-size: 13px;
      color: #6b7280;
    }
    .install-info strong { color: #f97316; }

    .install-btns {
      display: flex;
      gap: 8px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-orange {
      background: #f97316;
      color: #fff;
    }
    .btn-orange:hover { background: #ea6c0d; }

    .btn-outline {
      background: transparent;
      border: 1px solid #2a2d35;
      color: #9ca3af;
    }
    .btn-outline:hover { border-color: #3a3d45; color: #fff; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="nav-left">
      <span class="nav-logo">📡</span>
      <span class="nav-title">StremioFR Status</span>
      <span class="nav-version">v1.0.0</span>
    </div>

  </nav>

  <!-- Hero -->
  <div class="hero">
    <h1>Statut <span>StremioFR</span></h1>
    <p>Statut en temps réel des addons et instances de la communauté Stremio FR</p>
    <div class="hero-links">
      <a href="https://github.com/ninisq864/stremio-status-addonFR" class="hero-link" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </a>
      <a href="https://discord.gg/stremiofr" class="hero-link" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.18.125 18.3.19 18.4a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Discord
      </a>
      <a href="https://uptime-kuma-production-7c44.up.railway.app/status/stremiofr-addons" class="hero-link" target="_blank">
        📊 Status Page
      </a>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        Chargement des instances...
      </div>
    </div>
  </div>

  <!-- Install bar -->
  <div class="install-bar">
    <div class="install-info">
      <strong id="count">0</strong> instance(s) sélectionnée(s) — Choisissez votre méthode d'installation :
    </div>
    <div class="install-btns">
      <button class="btn btn-orange" onclick="install('app')">📺 Installer (App)</button>
      <button class="btn btn-outline" onclick="install('web')">🌐 Installer (Web)</button>
      <button class="btn btn-outline" onclick="copyLink()">🔗 Copier</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const UPTIME_KUMA_URL = 'https://uptime-kuma-production-7c44.up.railway.app';
    const STATUS_SLUG = 'stremiofr-addons';
    const ADDON_URL = window.location.origin;

    const SECTION_COLORS = ['orange','blue','green','purple','cyan'];
    const SECTION_ICONS = {
      'AIOStreams':    'https://raw.githubusercontent.com/Viren070/AIOStreams/main/packages/frontend/public/logo.png',
      'AIOMetadata':  'https://aiometadata.elfhosted.com/logo.png',
      'StremThru':    'https://i.imgur.com/vhQAnad.png',
      'Stream-Fusion':'https://i.imgur.com/jOzd3Oi.png',
      'COMET':        'https://i.imgur.com/jmVoVMu.jpeg',
    };

    let selected = new Set();
    let allMonitors = [];

    async function load() {
      try {
        const [p, h] = await Promise.all([
          fetch(`${UPTIME_KUMA_URL}/api/status-page/${STATUS_SLUG}`).then(r=>r.json()),
          fetch(`${UPTIME_KUMA_URL}/api/status-page/heartbeat/${STATUS_SLUG}`).then(r=>r.json())
        ]);
        render(p.publicGroupList || [], h.heartbeatList || {});
      } catch(e) {
        document.getElementById('content').innerHTML =
          '<div class="loading">❌ Impossible de charger les données</div>';
      }
    }

    function calcUptime(hbs) {
      if (!hbs.length) return 0;
      return Math.round((hbs.filter(h=>h.status===1).length / hbs.length) * 10000) / 100;
    }

    function render(groups, heartbeats) {
      allMonitors = [];
      let html = '';

      groups.forEach((group, gi) => {
        const name = group.name.replace(/\n/g,'').trim();
        const color = SECTION_COLORS[gi % SECTION_COLORS.length];
        const logo = SECTION_ICONS[name];
        const upTotal = group.monitorList.filter(m => {
          const last = (heartbeats[m.id]||[]).slice(-1)[0];
          return last && last.status === 1;
        }).length;

        html += `
        <div class="section-card">
          <div class="section-head">
            <div class="section-icon ${color}">
              ${logo ? `<img src="${logo}" onerror="this.parentElement.innerHTML='📡'">` : '📡'}
            </div>
            <div class="section-head-info">
              <div class="section-head-title">${name}</div>
              <div class="section-head-sub">${upTotal}/${group.monitorList.length} en ligne</div>
            </div>
            <button class="section-select-all" onclick="toggleGroup('${name}', this)">Tout sélectionner</button>
          </div>
          <div class="section-body">
            ${group.monitorList.map(monitor => {
              const hbs = heartbeats[monitor.id] || [];
              const last = hbs.slice(-1)[0];
              const isUp = last && last.status === 1;
              const uptime = calcUptime(hbs);
              const uptimeClass = uptime >= 99 ? 'high' : uptime >= 95 ? 'mid' : 'low';
              allMonitors.push({ id: monitor.id, name: monitor.name, group: name });
              return `
              <div class="instance" id="inst-${monitor.id}" onclick="toggle(${monitor.id})">
                <div class="checkbox">
                  <svg class="check-svg" width="9" height="7" viewBox="0 0 9 7" fill="none">
                    <path d="M1 3.5L3 5.5L8 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <span class="instance-name">${monitor.name}</span>
                <span class="uptime ${uptimeClass}">${uptime}%</span>
                <div class="status-dot ${isUp ? 'up' : 'down'}"></div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      });

      document.getElementById('content').innerHTML = html;
    }

    function toggle(id) {
      const el = document.getElementById(`inst-${id}`);
      selected.has(id) ? selected.delete(id) : selected.add(id);
      el.classList.toggle('selected', selected.has(id));
      document.getElementById('count').textContent = selected.size;
    }

    function toggleGroup(name, btn) {
      const group = allMonitors.filter(m => m.group === name);
      const allSel = group.every(m => selected.has(m.id));
      group.forEach(m => {
        const el = document.getElementById(`inst-${m.id}`);
        if (allSel) { selected.delete(m.id); el.classList.remove('selected'); }
        else { selected.add(m.id); el.classList.add('selected'); }
      });
      btn.textContent = allSel ? 'Tout sélectionner' : 'Tout désélectionner';
      document.getElementById('count').textContent = selected.size;
    }

    function install(method) {
      const url = `${ADDON_URL}/manifest.json`;
      if (method === 'app') window.open(`stremio://${url.replace(/https?:\/\//,'')}`, '_blank');
      else window.open(`https://web.stremio.com/#/addons?addon=${encodeURIComponent(url)}`, '_blank');
    }

    function copyLink() {
      navigator.clipboard.writeText(`${ADDON_URL}/manifest.json`).then(() => toast('✅ Lien copié !'));
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    load();
  </script>
</body>
</html>
